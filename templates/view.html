<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Daniel's Wiki</title>
    <!-- Base styles -->
    <link rel="stylesheet" href="/static/css/base.css">
    <!-- Component styles -->
    <link rel="stylesheet" href="/static/css/components/sidebar.css">
    <!-- Page specific styles -->
    <link rel="stylesheet" href="/static/css/pages/view.css">
    <link rel="stylesheet" href="/static/css/pages/folder.css">
    <link rel="stylesheet" href="/static/css/pages/view-specific.css">
    <!-- Icons -->
    <link rel="stylesheet" href="/static/vendor/font-awesome/css/all.min.css">
    <!-- highlight.js — theme switched by JS -->
    <link id="hljs-light" rel="stylesheet" href="/static/vendor/highlight/css/github.min.css">
    <link id="hljs-dark"  rel="stylesheet" href="/static/vendor/highlight/css/github-dark.min.css" disabled>
</head>
<body class="logged-in">
    <div class="wiki-container">
        {{template "folder_sidebar" .}}
        <main class="content">
            <header class="content-header">
                <h2><i class="fas fa-file-alt"></i> {{.Title}}</h2>
                <div class="content-actions">
                    <a href="#" onclick="confirmDelete()" class="button secondary delete-btn">
                        <i class="fas fa-trash"></i> Delete
                    </a>
                    <a href="/edit/{{.Title}}{{if .FolderPath}}?folder={{.FolderPath}}{{end}}" class="button">
                        <i class="fas fa-edit"></i> Edit
                    </a>
                </div>
            </header>

            {{if .FolderPath}}
            <div class="breadcrumbs">
                <ul>
                    {{range .Breadcrumbs}}
                    <li>
                        <a href="{{if eq .path ""}}/ {{else}}/category/{{.path}}{{end}}">
                            {{.name}}
                        </a>
                        <span class="separator">/</span>
                    </li>
                    {{end}}
                    <li>
                        <span class="active">{{.Title}}</span>
                    </li>
                </ul>
            </div>
            {{end}}

            <!-- Raw content stored here; rendered by marked.js below -->
            <div id="raw-content" hidden>{{.Content}}</div>
            <div id="rendered-content" class="content-body"></div>
        </main>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
    </button>

    <div id="loader" class="loader-overlay">
        <div class="loader-spinner"></div>
        <div class="loader-text">Deleting note...</div>
    </div>

    <script>
        window.sidebarData = {
            currentPath: "{{.CurrentPath}}",
            folderPath: "{{.FolderPath}}",
            noteTitle: "{{.Title}}"
        };
    </script>
    <!-- marked.js + highlight.js -->
    <script src="/static/vendor/marked/marked.min.js"></script>
    <script src="/static/vendor/highlight/js/highlight.min.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/view.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script>
        // Render markdown content
        marked.setOptions({
            breaks: false,
            gfm: true,
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    return hljs.highlight(code, { language: lang }).value;
                }
                return hljs.highlightAuto(code).value;
            }
        });

        const raw = document.getElementById('raw-content').textContent;
        document.getElementById('rendered-content').innerHTML = marked.parse(raw);

        // Apply highlight.js to any code blocks not already highlighted
        document.querySelectorAll('#rendered-content pre code').forEach(function(block) {
            if (!block.dataset.highlighted) hljs.highlightElement(block);
        });

        // Sync highlight.js theme with current page theme
        function syncHljsTheme() {
            const dark = document.body.classList.contains('dark-theme');
            document.getElementById('hljs-light').disabled = dark;
            document.getElementById('hljs-dark').disabled = !dark;
        }
        syncHljsTheme();

        // Re-sync when theme is toggled
        const _origToggle = window.toggleTheme;
        window.toggleTheme = function() { _origToggle(); syncHljsTheme(); };
    </script>
</body>
</html>
