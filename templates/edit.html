<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{if .IsNewPage}}New Page{{else}}Edit {{.Title}}{{end}} - Daniel's Wiki</title>
    <!-- Toast UI Editor CSS first so our overrides win -->
    <link rel="stylesheet" href="/static/vendor/toastui/toastui-editor.min.css">
<!-- highlight.js themes -->
    <link id="hljs-light" rel="stylesheet" href="/static/vendor/highlight/css/github.min.css">
    <link id="hljs-dark"  rel="stylesheet" href="/static/vendor/highlight/css/github-dark.min.css" disabled>
    <!-- Base styles -->
    <link rel="stylesheet" href="/static/css/base.css">
    <!-- Component styles -->
    <link rel="stylesheet" href="/static/css/components/sidebar.css">
    <!-- Page specific styles — loaded after Toast UI so our rules win -->
    <link rel="stylesheet" href="/static/css/pages/edit.css">
    <link rel="stylesheet" href="/static/css/pages/folder.css">
    <!-- Icons -->
    <link rel="stylesheet" href="/static/vendor/font-awesome/css/all.min.css">
</head>
<body class="logged-in">
    <div class="wiki-container">
        {{template "folder_sidebar" .}}
        <main class="content">
            <header class="content-header">
                <h2><i class="fas fa-file-alt"></i>{{if .IsNewPage}} New Page{{else}} Edit {{.Title}}{{end}}</h2>
                <div class="content-actions">
                    {{if not .IsNewPage}}
                    <a href="/view/{{.Title}}{{if .FolderPath}}?folder={{.FolderPath}}{{end}}" class="back-btn">
                        <i class="fas fa-arrow-left"></i> Back
                    </a>
                    {{end}}
                </div>
            </header>

            {{if .FolderPath}}
            <div class="breadcrumbs">
                <ul>
                    {{range $index, $crumb := .Breadcrumbs}}
                    <li>
                        <a href="{{if eq $crumb.path ""}}/ {{else}}/category/{{$crumb.path}}{{end}}">
                            {{$crumb.name}}
                        </a>
                        <span class="separator"> / </span>
                    </li>
                    {{end}}
                    <li>
                        <span class="active">{{if .IsNewPage}}New Page{{else}}Edit {{.Title}}{{end}}</span>
                    </li>
                </ul>
            </div>
            {{end}}

            <div class="content-body">
                <form id="note-form">
                    <input type="hidden" name="original_title" value="{{.Title}}">
                    <input type="hidden" name="folder_path" value="{{.FolderPath}}">
                    <input type="hidden" name="current_path" value="{{.CurrentPath}}">
                    <div class="form-group">
                        <label for="title">Page Title</label>
                        <input type="text" id="title" name="title" required placeholder="Enter page title" class="form-control" value="{{.Title}}">
                    </div>
                    <div class="form-group">
                        <!-- Hidden textarea holds the raw content for Go template rendering -->
                        <textarea id="raw-content" hidden>{{.Content}}</textarea>
                        <div id="editor"></div>
                    </div>
                    <div class="button-group">
                        <button type="button" id="save-btn" class="button primary">
                            <i class="fas fa-save"></i> Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </main>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
    </button>
    <div id="sidebar-data"
         data-current-path="{{.CurrentPath}}"
         data-folder-path="{{.FolderPath}}"
         data-note-title="{{.Title}}"
         data-is-new-page="{{if .IsNewPage}}true{{else}}false{{end}}">
    </div>
    <!-- highlight.js (needed for syncHljsTheme and preview) -->
    <script src="/static/vendor/highlight/js/highlight.min.js"></script>
    <!-- Toast UI Editor + code syntax highlight plugin (bundles its own hljs internally) -->
    <script src="/static/vendor/toastui/toastui-editor-all.min.js"></script>
    <script src="/static/vendor/toastui/toastui-editor-plugin-code-syntax-highlight-all.min.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/sidebar.js"></script>
    <script src="/static/js/pages/edit.js"></script>
    <script>
        const sidebarDataEl = document.getElementById('sidebar-data');
        window.sidebarData = {
            currentPath: sidebarDataEl.dataset.currentPath,
            folderPath: sidebarDataEl.dataset.folderPath,
            noteTitle: sidebarDataEl.dataset.noteTitle,
            isNewPage: sidebarDataEl.dataset.isNewPage === 'true'
        };
    </script>
</body>
</html>
